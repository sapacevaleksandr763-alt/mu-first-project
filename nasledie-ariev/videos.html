<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Видео — Наследие Ариев</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #b8942e;
      --gold-light: #d4af37;
      --gold-dark: #8a6a1a;
      --bg:     #f5f0e8;
      --bg-2:   #ece5d8;
      --bg-3:   #e2d9ca;
      --text:   #2c1e0f;
      --muted:  #6b5a45;
      --radius: 14px;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* фон */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('images/volkhv.jpg');
      background-size: cover;
      background-position: center top;
      filter: brightness(0.85) saturate(0.4) opacity(0.15);
      pointer-events: none;
      z-index: 0;
    }

    /* шапка */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245, 240, 232, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    .back:hover { color: var(--gold); }

    .header__title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    .header__tg {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #2196a8, #1976a0);
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .header__tg:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(33,150,168,0.4);
    }

    /* основное */
    .main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .page-header__rune {
      font-size: 1.8rem;
      color: var(--gold);
      opacity: 0.5;
      display: block;
      margin-bottom: 12px;
    }

    .page-header__title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .page-header__sub {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 14px auto 0;
    }

    /* плеер — главное видео */
    .player {
      background: var(--bg-2);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    .player video {
      width: 100%;
      display: block;
      max-height: 500px;
      background: #000;
    }

    .player__info {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .player__title {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      color: var(--text);
    }

    .player__num {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .player__share {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 8px;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.8rem;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .player__share:hover {
      background: rgba(201,168,76,0.08);
      border-color: var(--gold);
    }

    /* список роликов */
    .playlist {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 0;
    }

    .playlist__item {
      background: var(--bg-2);
      border: 1px solid rgba(201, 168, 76, 0.15);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s;
    }

    .playlist__item:hover,
    .playlist__item.active {
      border-color: rgba(201, 168, 76, 0.5);
      box-shadow: 0 6px 24px rgba(0,0,0,0.08), 0 0 16px rgba(201,168,76,0.06);
      transform: translateY(-3px);
    }

    .playlist__item.active {
      background: var(--bg-3);
    }

    .playlist__thumb {
      position: relative;
      width: 100%;
      padding-top: 65%;
      background: #000;
    }

    .playlist__thumb video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .playlist__play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.25);
      transition: background 0.2s;
    }

    .playlist__item:hover .playlist__play,
    .playlist__item.active .playlist__play {
      background: rgba(0,0,0,0.08);
    }

    .playlist__play svg {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }

    .playlist__label {
      padding: 12px 14px;
    }

    .playlist__name {
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      color: var(--text);
      margin-bottom: 3px;
    }

    .playlist__desc {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* нижний CTA */
    .cta {
      margin-top: 48px;
      text-align: center;
      padding: 36px 32px;
      background: var(--bg-2);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .cta h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .cta p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .btn-tg {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #2196a8, #1976a0);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.25s;
    }

    .btn-tg:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(33,150,168,0.4);
    }

    @media (max-width: 600px) {
      .playlist { grid-template-columns: 1fr; }
      .player__info { flex-direction: column; align-items: flex-start; }
      .header__title { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="landing.html" class="back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Назад
    </a>
    <span class="header__title">Наследие Ариев · Видео</span>
    <a href="https://t.me/nasledieariev" target="_blank" class="header__tg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.67-1.72 8.1c-.13.58-.47.72-.95.45l-2.63-1.94-1.27 1.22c-.14.14-.26.26-.53.26l.19-2.67 4.84-4.37c.21-.19-.05-.29-.32-.1L8.16 14.67l-2.57-.8c-.56-.17-.57-.56.12-.83l10.04-3.87c.47-.17.88.11.18.5z"/></svg>
      Подписаться
    </a>
  </header>

  <main class="main">

    <div class="page-header">
      <span class="page-header__rune">ᛊ</span>
      <h1 class="page-header__title">Короткие ролики</h1>
      <p class="page-header__sub">Веды, мифы и практики предков простым языком</p>
      <div class="divider"></div>
    </div>

    <!-- главный плеер -->
    <div class="player">
      <video id="mainVideo" controls playsinline preload="metadata">
        <source src="videos/video1.mp4" type="video/mp4" />
      </video>
      <div class="player__info">
        <div>
          <div class="player__title" id="mainTitle">Ролик 1</div>
          <div class="player__num" id="mainNum">Видео 1 из 3</div>
        </div>
        <a href="https://t.me/nasledieariev" target="_blank" class="player__share">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.67-1.72 8.1c-.13.58-.47.72-.95.45l-2.63-1.94-1.27 1.22c-.14.14-.26.26-.53.26l.19-2.67 4.84-4.37c.21-.19-.05-.29-.32-.1L8.16 14.67l-2.57-.8c-.56-.17-.57-.56.12-.83l10.04-3.87c.47-.17.88.11.18.5z"/></svg>
          Больше в канале
        </a>
      </div>
    </div>

    <!-- плейлист -->
    <div class="playlist" id="playlist"></div>

    <!-- CTA -->
    <div class="cta">
      <h2>Хочешь больше?</h2>
      <p>Все видео, чек-листы и мини-курс — в Telegram-канале «Наследие Ариев»</p>
      <a href="https://t.me/nasledieariev" target="_blank" class="btn-tg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.67-1.72 8.1c-.13.58-.47.72-.95.45l-2.63-1.94-1.27 1.22c-.14.14-.26.26-.53.26l.19-2.67 4.84-4.37c.21-.19-.05-.29-.32-.1L8.16 14.67l-2.57-.8c-.56-.17-.57-.56.12-.83l10.04-3.87c.47-.17.88.11.18.5z"/></svg>
        Перейти в канал
      </a>
    </div>

  </main>

  <script>
    const videos = [
      { src: 'videos/video1.mp4', title: 'Ролик 1', desc: 'Наследие предков' },
      { src: 'videos/video2.mp4', title: 'Ролик 2', desc: 'Ведические традиции' },
      { src: 'videos/video3.mp4', title: 'Ролик 3', desc: 'Обряды и символы' },
      { src: 'videos/video4.mp4', title: 'Ролик 4', desc: 'Путь предков' },
      { src: 'videos/video5.mp4', title: 'Ролик 5', desc: 'Боги и мифы' },
      { src: 'videos/video6.mp4', title: 'Ролик 6', desc: 'Славянские руны' },
      { src: 'videos/video7.mp4', title: 'Ролик 7', desc: 'Природный лад' },
      { src: 'videos/video8.mp4', title: 'Ролик 8', desc: 'Родовая память' },
      { src: 'videos/video9.mp4', title: 'Ролик 9', desc: 'Мудрость Вед' },
    ];

    const mainVideo = document.getElementById('mainVideo');
    const mainTitle = document.getElementById('mainTitle');
    const mainNum   = document.getElementById('mainNum');
    const playlist  = document.getElementById('playlist');

    const playIcon = `<svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="24" fill="rgba(201,168,76,0.85)"/><path d="M19 15l14 9-14 9V15z" fill="#0d0804"/></svg>`;

    // рендер плейлиста
    videos.forEach((v, i) => {
      const item = document.createElement('div');
      item.className = 'playlist__item' + (i === 0 ? ' active' : '');
      item.innerHTML = `
        <div class="playlist__thumb">
          <video src="${v.src}" preload="metadata" muted></video>
          <div class="playlist__play">${playIcon}</div>
        </div>
        <div class="playlist__label">
          <div class="playlist__name">${v.title}</div>
          <div class="playlist__desc">${v.desc}</div>
        </div>`;
      item.addEventListener('click', () => switchVideo(i, item));
      playlist.appendChild(item);
    });

    function switchVideo(index, el) {
      document.querySelectorAll('.playlist__item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      const v = videos[index];
      mainVideo.src = v.src;
      mainTitle.textContent = v.title;
      mainNum.textContent   = `Видео ${index + 1} из ${videos.length}`;
      mainVideo.play();
      mainVideo.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    mainVideo.addEventListener('ended', () => {
      const items = document.querySelectorAll('.playlist__item');
      const active = document.querySelector('.playlist__item.active');
      const idx = Array.from(items).indexOf(active);
      if (idx < items.length - 1) switchVideo(idx + 1, items[idx + 1]);
    });
  </script>

</body>
</html>
