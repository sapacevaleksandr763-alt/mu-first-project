<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Александр Сапачёв</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #060c1f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 25% 15%, rgba(109,92,255,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 85%, rgba(80,120,255,0.10) 0%, transparent 50%);
  }

  .card {
    width: 100%;
    max-width: 500px;
    background: linear-gradient(160deg, #0e1830 0%, #111d3a 100%);
    border-radius: 30px;
    padding: 48px 40px 42px;
    text-align: center;
    border: 1px solid rgba(109,92,255,0.22);
    box-shadow:
      0 4px 60px rgba(0,0,0,0.55),
      0 0 90px rgba(109,92,255,0.07),
      0 0 0 1px rgba(255,255,255,0.03);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -130px;
    left: 50%;
    transform: translateX(-50%);
    width: 480px;
    height: 230px;
    background: radial-gradient(ellipse, rgba(109,92,255,0.26) 0%, transparent 70%);
    pointer-events: none;
  }

  .badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 999px;
    background: rgba(109,92,255,0.11);
    border: 1px solid rgba(109,92,255,0.26);
    color: #a78bfa;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6d5cff, #9333ea);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 800;
    margin: 0 auto 22px;
    letter-spacing: -1px;
    box-shadow:
      0 0 0 3px rgba(109,92,255,0.22),
      0 0 32px rgba(109,92,255,0.46);
  }

  .name {
    font-size: 40px;
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #c084fc 0%, #818cf8 52%, #93c5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    letter-spacing: -1.5px;
    filter: drop-shadow(0 0 24px rgba(192,132,252,0.46));
  }

  .specialty {
    font-size: 13px;
    color: #818cf8;
    font-weight: 600;
    margin-bottom: 20px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .dot { color: #3d5070; margin: 0 10px; font-weight: 400; }

  .bio {
    font-size: 15px;
    line-height: 1.68;
    color: #8fa3c8;
    max-width: 380px;
    margin: 0 auto 28px;
  }

  .socials {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 26px;
  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    color: #55698f;
    text-decoration: none;
    will-change: transform;
    transition:
      transform   0.32s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow  0.22s cubic-bezier(0.22, 1, 0.36, 1),
      background  0.18s ease,
      border-color 0.18s ease,
      color       0.18s ease;
  }

  .social-link:hover {
    transform: translateY(-5px);
    background: rgba(109,92,255,0.16);
    border-color: rgba(109,92,255,0.42);
    box-shadow: 0 10px 28px rgba(109,92,255,0.32);
    color: #c084fc;
  }

  .social-link svg { width: 21px; height: 21px; fill: currentColor; }

  .cta-btn {
    display: block;
    max-width: 256px;
    margin: 0 auto 22px;
    background: linear-gradient(135deg, #7465ff 0%, #6d5cff 40%, #9333ea 100%);
    color: white;
    text-decoration: none;
    padding: 15px 38px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.4px;
    will-change: transform;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.14),
      0 4px 24px rgba(109,92,255,0.46);
    transition:
      transform  0.22s cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 0.22s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .cta-btn:hover {
    transform: translateY(-3px) scale(1.025);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      0 12px 36px rgba(109,92,255,0.62);
  }

  .contacts {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 4px 10px;
    font-size: 13px;
    color: #3d5070;
    line-height: 1.7;
  }

  .contacts a {
    color: #6d7ef8;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.16s ease;
  }

  .contacts a:hover { color: #c084fc; }

  .contacts .sep { color: #2d3f5a; }

  @media (max-width: 480px) {
    .card { padding: 34px 22px 30px; border-radius: 24px; }
    .name { font-size: 32px; }
    .avatar { width: 68px; height: 68px; font-size: 22px; }
    .cta-btn { max-width: 100%; font-size: 15px; padding: 14px 28px; }
    .contacts { flex-direction: column; gap: 2px; }
    .contacts .sep { display: none; }
  }
</style>
</head>
